set_level:
  fields:
    level:
      required: true
      example: 70
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: box

set_channel_level:
  fields:
    channels:
      required: true
      example: "[7122, 7128]"
      selector:
        object:
    level:
      required: true
      example: 70
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: box

set_channel_db:
  fields:
    channels:
      required: true
      example: "[7122, 7128]"
      selector:
        object:
    db:
      required: true
      example: -30
      selector:
        number:
          min: -72
          max: 12
          step: 0.1
          unit_of_measurement: dB
          mode: box

trigger_event:
  fields:
    name:
      required: true
      example: "Fête FR"
      selector:
        text:

cancel_event:
  fields:
    name:
      required: true
      example: "Fête FR"
      selector:
        text:
